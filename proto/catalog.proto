syntax = "proto3";
package atlas.catalog;

option go_package = "atlas/coordinator/internal/catalogpb;catalogpb";

// Metadata catalog service: Postgres-backed, transactional snapshot commits.
// See docs/atlas-implementation-spec.md §1.3 (schema) and Phase 2 tasks 6-10.
// Served standalone on port 9091 by coordinator/cmd/catalog. Consumed by
// atlas-cli (Rust, tonic client) for `ingest`/`query --dataset` and later by
// the coordinator itself (Phase 3).

service CatalogService {
  rpc CreateDataset(CreateDatasetRequest) returns (Dataset);
  rpc GetDataset(GetDatasetRequest) returns (Dataset);
  rpc ListDatasets(ListDatasetsRequest) returns (ListDatasetsResponse);
  rpc CommitSnapshot(CommitSnapshotRequest) returns (Snapshot);
  rpc GetCurrentSnapshot(GetSnapshotRequest) returns (Snapshot);
  rpc ListManifests(ListManifestsRequest) returns (ListManifestsResponse);
}

message Dataset {
  string id = 1;
  string name = 2;
  string schema_json = 3;
  string current_snapshot_id = 4; // empty if no snapshot committed yet
  string created_at = 5;          // RFC3339
}

message Snapshot {
  string id = 1;
  string dataset_id = 2;
  string parent_snapshot_id = 3; // empty for the first snapshot
  string manifest_list_path = 4;
  string operation = 5;          // "append" | "overwrite" | "delete"
  string summary_json = 6;
  string created_at = 7;         // RFC3339
}

message Manifest {
  string id = 1;
  string snapshot_id = 2;
  string file_path = 3;
  string partition_values_json = 4; // {column: value}
  int64 row_count = 5;
  int64 file_size_bytes = 6;
  string column_stats_json = 7; // {column: {min, max, null_count}}
}

message CreateDatasetRequest {
  string name = 1;
  string schema_json = 2;
}

message GetDatasetRequest {
  string name = 1;
}

message ListDatasetsRequest {}

message ListDatasetsResponse {
  repeated Dataset datasets = 1;
}

message CommitSnapshotRequest {
  string dataset_id = 1;
  string manifest_list_path = 2;
  string operation = 3;
  string summary_json = 4;
  repeated ManifestInput manifests = 5;
}

message ManifestInput {
  string file_path = 1;
  string partition_values_json = 2;
  int64 row_count = 3;
  int64 file_size_bytes = 4;
  string column_stats_json = 5;
}

message GetSnapshotRequest {
  string dataset_name = 1;
}

message ListManifestsRequest {
  string snapshot_id = 1;
}

message ListManifestsResponse {
  repeated Manifest manifests = 1;
}
