services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atlas
      MINIO_ROOT_PASSWORD: atlas-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog:
    build:
      context: ..
      dockerfile: coordinator/Dockerfile
    entrypoint: ["/usr/local/bin/catalog"]
    environment:
      DATABASE_URL: postgres://atlas:atlas@postgres:5432/atlas
      CATALOG_ADDR: ":9091"
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy

  # Three explicit worker services (rather than one service scaled via
  # `deploy.replicas`) so the coordinator's WORKER_ADDRS lists distinct,
  # individually heartbeat-tracked addresses — a scaled service's shared DNS
  # name would round-robin instead, defeating per-worker liveness tracking.
  #
  # `data` is a shared volume so `.atlas` files ingested at the same
  # container-visible path are readable by every worker. When ingesting from
  # the host with a native (non-Docker) `atlas-cli`, point `--data-dir` at
  # this same bind-mounted host directory (./data) so the paths committed to
  # the catalog resolve inside these containers too.
  worker-1:
    build:
      context: ..
      dockerfile: engine/Dockerfile
    command: ["--addr", "0.0.0.0:9100"]
    volumes:
      - ./data:/data
    expose:
      - "9100"

  worker-2:
    build:
      context: ..
      dockerfile: engine/Dockerfile
    command: ["--addr", "0.0.0.0:9100"]
    volumes:
      - ./data:/data
    expose:
      - "9100"

  worker-3:
    build:
      context: ..
      dockerfile: engine/Dockerfile
    command: ["--addr", "0.0.0.0:9100"]
    volumes:
      - ./data:/data
    expose:
      - "9100"

  coordinator:
    build:
      context: ..
      dockerfile: coordinator/Dockerfile
    entrypoint: ["/usr/local/bin/coordinator"]
    environment:
      DATABASE_URL: postgres://atlas:atlas@postgres:5432/atlas
      CATALOG_ADDR: "catalog:9091"
      COORDINATOR_ADDR: ":8080"
      WORKER_ADDRS: "worker-1:9100,worker-2:9100,worker-3:9100"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "8080:8080"
    depends_on:
      - catalog
      - worker-1
      - worker-2
      - worker-3
      - redis

volumes:
  postgres-data:
  minio-data:
