services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atlas
      MINIO_ROOT_PASSWORD: atlas-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog:
    build:
      context: ..
      dockerfile: coordinator/Dockerfile
    entrypoint: ["/usr/local/bin/catalog"]
    environment:
      DATABASE_URL: postgres://atlas:atlas@postgres:5432/atlas
      CATALOG_ADDR: ":9091"
      # 9095, not 9092 — that's reserved for the future AI service's gRPC
      # port (docs/atlas-implementation-spec.md §1.4).
      CATALOG_METRICS_ADDR: ":9095"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "9091:9091"
      - "9095:9095"
    depends_on:
      postgres:
        condition: service_healthy

  # Three explicit worker services (rather than one service scaled via
  # `deploy.replicas`) so the coordinator's WORKER_ADDRS lists distinct,
  # individually heartbeat-tracked addresses — a scaled service's shared DNS
  # name would round-robin instead, defeating per-worker liveness tracking.
  #
  # `data` is a shared volume so `.atlas` files ingested at the same
  # container-visible path are readable by every worker. When ingesting from
  # the host with a native (non-Docker) `atlas-cli`, point `--data-dir` at
  # this same bind-mounted host directory (./data) so the paths committed to
  # the catalog resolve inside these containers too.
  worker-1:
    build:
      context: ..
      dockerfile: engine/Dockerfile
    command: ["--addr", "0.0.0.0:9100", "--metrics-addr", "0.0.0.0:9101"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    volumes:
      - ./data:/data
    expose:
      - "9100"
      - "9101"

  worker-2:
    build:
      context: ..
      dockerfile: engine/Dockerfile
    command: ["--addr", "0.0.0.0:9100", "--metrics-addr", "0.0.0.0:9101"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    volumes:
      - ./data:/data
    expose:
      - "9100"
      - "9101"

  worker-3:
    build:
      context: ..
      dockerfile: engine/Dockerfile
    command: ["--addr", "0.0.0.0:9100", "--metrics-addr", "0.0.0.0:9101"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    volumes:
      - ./data:/data
    expose:
      - "9100"
      - "9101"

  coordinator:
    build:
      context: ..
      dockerfile: coordinator/Dockerfile
    entrypoint: ["/usr/local/bin/coordinator"]
    environment:
      DATABASE_URL: postgres://atlas:atlas@postgres:5432/atlas
      CATALOG_ADDR: "catalog:9091"
      COORDINATOR_ADDR: ":8080"
      WORKER_ADDRS: "worker-1:9100,worker-2:9100,worker-3:9100"
      AI_SERVICE_ADDR: "ai-service:9092"
      REDIS_URL: "redis://redis:6379"
      # Dev-only: a hardcoded shared secret is fine for local compose, but
      # this is exactly the one env var in this stack with no code-level
      # fallback (see coordinator/cmd/coordinator/main.go) — a production
      # deployment must override it.
      JWT_SECRET: "dev-insecure-secret-change-me"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "8080:8080"
    depends_on:
      - catalog
      - worker-1
      - worker-2
      - worker-3
      - redis
      - ai-service

  # Local model runtime for the ai-service's ollama provider (Phase 6 task
  # 7) — the first-class, no-API-key path (README: "No hosted-LLM API key
  # required if ATLAS_LLM_PROVIDER=ollama"). `ollama-models` persists pulled
  # models across restarts; pull one with e.g.
  # `docker compose exec ollama ollama pull llama3` before pointing
  # ATLAS_LLM_MODEL at it.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  ai-service:
    build:
      context: ..
      dockerfile: ai-service/Dockerfile
    environment:
      ATLAS_LLM_PROVIDER: "ollama"
      ATLAS_LLM_MODEL: "llama3"
      OLLAMA_API_BASE: "http://ollama:11434"
      AI_SERVICE_ADDR: "0.0.0.0:9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "9092:9092"
    depends_on:
      - ollama

  # Trace visualization for the OTel spans coordinator/catalog/workers emit
  # once OTEL_EXPORTER_OTLP_ENDPOINT is set (it is, above, pointed at this
  # service) — a query's trace id can be searched for here to see the
  # REST -> catalog -> worker span tree in one place.
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC

  # Scrapes the /metrics endpoints coordinator, catalog, and each worker
  # expose (see prometheus.yml).
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  postgres-data:
  minio-data:
  ollama-models:
