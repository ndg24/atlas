global:
  scrape_interval: 15s

scrape_configs:
  - job_name: coordinator
    static_configs:
      - targets: ["coordinator:8080"]

  - job_name: catalog
    static_configs:
      - targets: ["catalog:9095"]

  - job_name: atlas-workers
    static_configs:
      - targets: ["worker-1:9101", "worker-2:9101", "worker-3:9101"]
